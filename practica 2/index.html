<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probando Estructura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>

<body class="vh-100">
    <div class="container-fluid  vh-100">
        <div class="row h-75">
            <div class="col-3 h-100" style="height: 5rem; background-color: grey;">
                <div class="list-group text-center"> Practica 2
                    <button type="button" class="list-group-item list-group-item-action text-white"
                        style="background-color: grey;">Inicio</button>
                    <button type="button" class="list-group-item list-group-item-action text-white"
                        style="background-color: grey;">Agregar Producto</button>
                    <button type="button" class="list-group-item list-group-item-action text-white"
                        style="background-color: grey;">Listado de Productos</button>
                </div>
            </div>
            <div class="col-9 pt-5">
                <h3 class="text-center">Formulario de Ventas</h3>
                <p class="text-center text-white fs-5"> Principal</p>
                <div class="container">
                    <div class="shadow-lg p-3 mb-5 bg-body-tertiary rounded">
                        <div id="Formulario" class="row g-3">
                            <div class="col-sm">
                                <input id="id" type="text" class="form-control" placeholder="id/inventario"
                                    aria-label="ej:P205">
                            </div>
                            <div class="col-sm">
                                <input id="descripcion" type="text" class="form-control" placeholder="Descripción"
                                    aria-label="Descripción">
                            </div>
                            <div class="col-sm">
                                <label class="visually-hidden" for="autoSizingSelect">Preference</label>
                                <select class="form-select" id="autoSizingSelect">
                                    <option selected></option>
                                    <option value="1">Frutas</option>
                                    <option value="2">Verduras</option>
                                    <option value="3">Lacteos</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-primary">Guardar</button>
                        </div>
                    </div>
                </div>
                <div class="container">
                    <button type="button" class="btn btn-primary">Lista Completa</button>
                    <button type="button" class="btn btn-secondary">Frutas</button>
                    <button type="button" class="btn btn-success">Verduras</button>
                    <button type="button" class="btn btn-danger">Lacteos</button>
                    <button type="button" class="btn btn-warning">Ocultar Lista</button>
                </div>
                <div class="container mt-5">
                    <h2 class="text-center mb-4">Listado</h2>
                    <table class="table table-bordered table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>Id</th>
                                <th>Descripción</th>
                                <th>Departamento</th>
                            </tr>
                        </thead>
                        <tbody id="tablaPanelistas">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="js/js.js"></script>
</body>

</html>
